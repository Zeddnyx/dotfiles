[global/wm]
include-file = ~/.config/bspwm/polybar/system
include-file = ~/.config/bspwm/polybar/colour
include-file = ~/.config/bspwm/polybar/modules

[bar/main]
bottom = false
fixed-center = true
width = 15%
height = 22
offset-x = 0.5%
offset-y = 0.50%
radius = 0.0
background = ${colour.background}
line-size = 2
padding = 2
font-0 = "Iosevka Nerd Font:size=8.7;3"
font-1 = "Iosevka Nerd Font:style:bold:size=8.7;3"

modules-left = date sep cpu sep memory

spacing = 0
dim-value = 1.0
wm-name = bspwm
wm-restack = bspwm
enable-ipc = true

;bspwm
scrool-up = bspc desktop -f prev.local
scrool-down = bspc desktop -f next.local

[settings]
screenchange-reload = true
compositing-background = source
